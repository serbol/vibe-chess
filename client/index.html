<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1014" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="vibe.chess" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>vibe chess</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <!-- Snowfall background (decorative, behind everything). -->
    <div id="snowfall" class="snowfall" aria-hidden="true"></div>

    <!-- Landing screen -->
    <section id="screen-landing" class="screen">
      <div class="card">
        <img class="logo" src="/icon.svg" alt="vibe.chess logo" width="96" height="96" />
        <h1>vibe<span class="accent">.chess</span></h1>
        <p class="muted">Enter a name and find a match.</p>
        <input id="name-input" type="text" maxlength="24" placeholder="Your name" autocomplete="off" />
        <button id="find-game-btn" class="primary">Find Game</button>
        <button id="play-bot-btn" class="secondary">Practice vs Bot</button>
        <button id="install-btn" class="install-btn hidden" type="button" aria-label="Install vibe.chess as an app">
          <span class="install-icon" aria-hidden="true">⬇</span>
          <span>Install app</span>
        </button>
        <p id="landing-status" class="status"></p>
      </div>
    </section>

    <!-- Game screen -->
    <section id="screen-game" class="screen hidden">
      <header class="game-header">
        <div class="player-info">
          <span class="player opponent" id="opponent-name">Opponent</span>
          <span class="vs">vs</span>
          <span class="player you" id="your-name">You</span>
        </div>
        <div class="turn-indicator">
          <span id="turn-label">White to move</span>
        </div>
        <div class="game-controls">
          <button id="resign-btn">Resign</button>
          <button id="draw-btn">Offer Draw</button>
        </div>
      </header>

      <main class="game-main">
        <aside class="captured-tray captured-left" id="captured-by-you" aria-label="You captured"></aside>
        <div id="pixi-mount" class="board-mount"></div>
        <aside class="captured-tray captured-right" id="captured-by-opp" aria-label="Opponent captured"></aside>
      </main>

      <aside class="move-history" aria-label="Move history">
        <h2>Moves</h2>
        <ol id="move-list"></ol>
      </aside>

      <div id="toast" class="toast hidden"></div>

      <!-- Draw offer modal -->
      <div id="draw-modal" class="modal hidden">
        <div class="modal-card">
          <p>Opponent offers a draw.</p>
          <div class="modal-actions">
            <button id="accept-draw-btn" class="primary">Accept</button>
            <button id="decline-draw-btn">Decline</button>
          </div>
        </div>
      </div>

      <!-- Game over modal -->
      <div id="gameover-modal" class="modal hidden">
        <div class="modal-card">
          <h2 id="gameover-title">Game over</h2>
          <p id="gameover-detail" class="muted"></p>
          <div class="modal-actions">
            <button id="gameover-find-btn" class="primary">Find New Opponent</button>
            <button id="gameover-menu-btn">Go Back to Menu</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Connection-state notification (separate from transient toasts). -->
    <div id="connection-banner" class="connection-banner hidden" role="status" aria-live="polite"></div>

    <!-- Offline alert: shown when the user tries to find an online match while offline. -->
    <div id="offline-modal" class="modal hidden" role="alertdialog" aria-labelledby="offline-title">
      <div class="modal-card">
        <h2 id="offline-title">Please enable Internet connection!</h2>
        <p class="muted">Online matches need a network connection. You can still practice against the bot in offline mode.</p>
        <div class="modal-actions">
          <button id="offline-ok-btn" class="primary">OK</button>
        </div>
      </div>
    </div>


    <script type="module" src="/js/main.js"></script>
    <script>
      // Register the service worker for offline support / installability.
      // Skip on localhost so Vite HMR isn't intercepted in dev.
      (function () {
        if (!('serviceWorker' in navigator)) return;
        var host = location.hostname;
        if (host === 'localhost' || host === '127.0.0.1') return;
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function (err) {
            console.warn('service worker registration failed:', err);
          });
        });
      })();
    </script>
  </body>
</html>
